services:
  postgres:
    image: postgres:16
    container_name: clantracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clan_leagues_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clan_leagues_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clantracker-network

  redis:
    image: redis:7
    container_name: clantracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clantracker-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clantracker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      # Internal service URLs — point to sibling containers; do not change these.
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/clan_leagues_tracker
      REDIS_URL: redis://redis:6379
      PORT: 3000
      # User-configurable — set in a .env file (copy .env.example → .env)
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
      WOM_API_KEY: ${WOM_API_KEY:-}
      WOM_USER_AGENT: ${WOM_USER_AGENT:-ClanLeaguesTracker/1.0}
      WOM_BASE_URL: ${WOM_BASE_URL:-https://api.wiseoldman.net/v2}
      QUEUE_NAME: ${QUEUE_NAME:-clan-sync-queue}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clantracker-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the JS bundle at build time — must be the URL a browser can reach.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
    container_name: clantracker-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "3001:3001"
    networks:
      - clantracker-network

volumes:
  postgres_data:
  redis_data:

networks:
  clantracker-network:
    driver: bridge
