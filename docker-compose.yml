services:
  postgres:
    image: postgres:16
    container_name: clantracker-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: clan_leagues_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d clan_leagues_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clantracker-network

  redis:
    image: redis:7
    container_name: clantracker-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clantracker-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clantracker-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/clan_leagues_tracker
      REDIS_URL: redis://redis:6379
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clantracker-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clantracker-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
    ports:
      - "3001:3001"
    networks:
      - clantracker-network

volumes:
  postgres_data:
  redis_data:

networks:
  clantracker-network:
    driver: bridge
